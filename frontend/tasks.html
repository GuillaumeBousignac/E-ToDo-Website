<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>E-ToDo Website - Tasks</title>

  <link id="stylesheet" rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="css/colorblind.css">
  <script src="https://kit.fontawesome.com/8f9826255d.js" crossorigin="anonymous"></script>
  <script src="/task.js" defer></script>
</head>

<body>

  <header>
    <div class="header-title">
      <h1>E-ToDo Website</h1>
      <h2>Organization is the Key.</h2>
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="theme-toggle" title="Change Theme">
        <i id="theme-icon" class="fa-solid fa-sun"></i>
      </button>

      <a id="btn-user" class="icon-btn" href="/login.html" title="Profile">
        <i class="fa-solid fa-user"></i>
      </a>

      <button id="btn-disco" class="icon-btn" title="Disconnect">
        <i class="fa-solid fa-right-to-bracket"></i>
      </button>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="sb-nav">
      <a class="sb-btn" href="/dashboard.html">
        <i class="fa-solid fa-calendar-days"></i>
        <span class="sb-label">Calendar</span>
      </a>

      <a class="sb-btn active" href="/tasks.html">
        <i class="fa-solid fa-list-check"></i>
        <span class="sb-label">Tasks</span>
      </a>
    </nav>
  </aside>

  <main class="tasks-wrap">

    <section>
      <div class="card-head">
        <h4 class="task-title">Current tasks</h4>

        <div class="card-actions">
          <button id="btn-add-task" class="button with-icon">
            <i class="fa-solid fa-plus"></i><span>New task</span>
          </button>

          <span class="chip" id="count-chip">0 task</span>
        </div>
      </div>

      <div id="task-list" class="task-list"></div>
      <div id="empty" class="empty" style="display:none;">No tasks yet.</div>
    </section>

    <aside class="right-rail">
      <h4>Filters</h4>
      <div class="filter-row">
        <input type="text" id="q" placeholder="Search title / description">
        <select id="status">
          <option value="">All</option>
          <option value="todo">To do</option>
          <option value="inprogress">In progress</option>
          <option value="done">Done</option>
        </select>
      </div>

      <h4 style="margin-top:.6rem;">Overview</h4>
      <article class="card kpi">
        <div class="kpi-icon"><i class="fa-solid fa-clipboard-list"></i></div>
        <div class="kpi-meta">
          <h4>Total</h4>
          <p id="stat-total">0</p>
        </div>
      </article>
      <article class="card kpi">
        <div class="kpi-icon"><i class="fa-solid fa-hourglass-half"></i></div>
        <div class="kpi-meta">
          <h4>In progress</h4>
          <p id="stat-inprogress">0</p>
        </div>
      </article>
      <article class="card kpi">
        <div class="kpi-icon"><i class="fa-solid fa-check"></i></div>
        <div class="kpi-meta">
          <h4>Completed</h4>
          <p id="stat-done">0</p>
        </div>
      </article>
    </aside>

  </main>

  <dialog id="event-modal">
    <form id="event-form" method="dialog">
      <h3>New Task</h3>

      <label>
        Title
        <input id="evt-title" type="text" required>
      </label>

      <label>
        Start Date
        <input id="evt-start-date" type="date" required>
      </label>

      <label>
        End Date
        <input id="evt-end-date" type="date">
      </label>

      <label>
        Status
        <select id="evt-status" required>
          <option value="todo">To do</option>
          <option value="inprogress">In progress</option>
          <option value="done">Done</option>
        </select>
      </label>

      <menu class="modal-actions">
        <button id="evt-delete" type="button" class="danger" hidden>Delete</button>
        <button id="evt-cancel" type="button">Cancel</button>
        <button id="evt-save" type="submit" class="primary">Save</button>
      </menu>
    </form>
  </dialog>
<script src="colorblind.js"></script>
</body>
</html>
